model = "openai/gpt-4.1-mini"
api_base_url = "https://api.pinference.ai/api/v1"
api_key_var = "PRIME_API_KEY"
num_examples = 90
rollouts_per_example = 1
max_concurrent = 32
save_results = true
env_dir_path = "."

[[eval]]
env_id = "advancedif_rlm_skill"

[eval.sampling_args]
temperature = 0.2

[eval.env_args]
benchmark_split = "main_eval"
feedback_mode = "one_violation"
allow_skill_updates = true
judge_model = "z-ai/glm-4.7"
max_turns = 6
repl_language = "python"
sub_model = "openai/gpt-4.1-mini"
sandbox_docker_image = "python:3.11-slim"
sandbox_cpu_cores = 8
sandbox_memory_gb = 16
sandbox_disk_size_gb = 40
sandbox_gpu_count = 0
sandbox_timeout_minutes = 60
code_execution_timeout = 300
