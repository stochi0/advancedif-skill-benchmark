model = "openai/gpt-4.1-mini"
api_base_url = "https://api.pinference.ai/api/v1"
api_key_var = "PRIME_API_KEY"
num_examples = 8
rollouts_per_example = 1
max_concurrent = 16
save_results = true
env_dir_path = "."
state_columns = [
  "current_skill_markdown",
  "current_skill_path",
  "skill_snapshot_paths",
  "criterion_vector",
  "final_answer",
  "judge_history",
  "judge_calls",
  "judge_queries",
  "judge_prompt_tokens",
  "judge_completion_tokens",
  "first_submission_score",
]

[[eval]]
env_id = "advancedif_iter_skill"

[eval.sampling_args]
temperature = 0.2

[eval.env_args]
benchmark_split = "main_eval"
max_examples = 8
feedback_mode = "score_only"
allow_skill_updates = true
judge_model = "z-ai/glm-4.7"
max_turns = 6
